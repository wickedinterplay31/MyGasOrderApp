<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gas App Launcher</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f4f6fb;
      color: #1f2a44;
    }

    .container {
      background: white;
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 16px 40px rgba(34, 58, 80, 0.12);
      max-width: 520px;
      text-align: center;
    }

    a {
      color: #3b66ff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gas Order App</h1>
    <p>Start the Flask backend and open the app in your browser.</p>
    <p><strong>Run:</strong> <code>python app.py</code></p>
    <p>Then go to:</p>
    <p><a href="http://127.0.0.1:5000/">http://127.0.0.1:5000/</a></p>
  </div>
</body>
</html>
